package:
  name: php-frankenphp-8.3-ds
  version: 1.8.0
  epoch: 0
  description: "An extension providing efficient data structures for PHP"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-frankenphp-8.3

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - php-frankenphp-8.3
      - php-frankenphp-8.3-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php-ds/ext-ds
      tag: "v${{package.version}}"
      expected-commit: 49476da8e1771f14f37d1012a4dc766cac537205

  - name: Prepare build
    runs: phpize

  - name: Build
    runs: |
      set -x
      ./configure

  - name: Make install
    runs: |
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=ds.so" > "${{targets.subpkgdir}}/etc/php/conf.d/ds.ini"

update:
  enabled: true
  github:
    identifier: php-ds/ext-ds
    strip-prefix: v
    tag-filter: v
    use-tag: true
