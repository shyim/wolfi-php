package:
  name: blackfire
  version: 2026.5.0
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: 331d8eef0f8aefea2ad8330fb0ec7ae5012de0f74f165b8133a7dd3c88bc17b248eaf10d05a1cb49bcf9718f7234de659108a4b725b7b53e07eec773c72cd5ce

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: 43754392dce2bf2f838037768e97264959d1936fa469c599bcb85572ae1d1a08d0b5252a268f785dbff6f663f8bdd0b0d4609be7dc54c3e484f689d8a8127207

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
