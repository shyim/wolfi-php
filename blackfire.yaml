package:
  name: blackfire
  version: 2026.5.1
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: 8ce39c060a9898bf97877d3640393533c3ba3e86ed655f57a38f6a55e585a9e9f9af514a801cbfd14e5ef92d25fc7883bbc0baa98487bfcbd1e6bf39e213463c

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: 3d263618126d6f03319be87e8e18ce061dc9c3c1634ef481f3df7cafe789ddb0f98da41da40dfcb2519dddf18ae2a92e83eea747196aecdcfa46f19e9f42c7ef

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
