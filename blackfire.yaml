package:
  name: blackfire
  version: 2026.3.1
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: a92a2d328cd239efad3e27ea3c6bff49e1ff1108d5f6b1a17be5ef9d76dfb4b4b061a4937b7db6be80c98590dd902b6774b34a2ca80b32eb21a374ac64f8d373

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: 032b3af5c89eb53ab6152120b8e3a0e05b35754af8d3e1589d66b3f8781431d5dc1629b0a1239aea36eef02ec1bb176551a991c782c7dc9a2038a070dadc940c

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
