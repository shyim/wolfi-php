package:
  name: blackfire
  version: 2026.6.0
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: 835b9b878eeb53348bf5e0bf25836835dedf166d3668517e55c5cd46227071281a6fe9830db89ef001ce661124471f233e16fe3681e881efe1dbc3e262211d13

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: f56e16590a446e6073d7556eb65bdba7cca038247f69f7204cb43ad6aad17013292764915f2e6ddaa8b5381fc8a1f73442a7bfb930a001955036061bf7b8b8f8

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
