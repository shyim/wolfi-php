package:
  name: blackfire
  version: 2026.3.0
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: 9b0ee0114b016ead28b8d2485e68fd980f9239c8a8e051081a9b4998c7f8828257900a02aabb1049bf015d561e6c385bf67dd7ac01a0f067334c469bc12ed8e5

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: ca829f0da6395540403e93537cb2a6340e1b52595accc680d018c3ef23f21ee56176f52db314c3994b263ba92b76f559bbbdc44c3d5fda26a978a93956f6adb2

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
