package:
  name: blackfire
  version: 2026.6.1
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: be6f3375bf5fcd44df679aaf593be9907a3dc1d2667f7944ff25f614345bca77f6eeaf227a66ae9a6201a19ff04286486b31c3b2a043bb26a4746ea27aa4f938

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: d2ae831e10ecf07f659d357e5607b510e1cbdcd6c6d716cc859de55c06f458c571e7cbcb6aeb1ded68f4eb33b562b188bbeaa56e72049b5c9b0f1518ef445443

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
