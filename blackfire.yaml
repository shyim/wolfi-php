package:
  name: blackfire
  version: 2026.3.2
  epoch: 0
  description: "Blackfire CLI"
  copyright:
    - license: PROPRIETARY
  options:
    no-provides: true

environment:
  contents:
    packages:
      - bash
      - busybox
      - curl

pipeline:
  - uses: fetch
    if: ${{build.arch}} == 'x86_64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/x86_64
      expected-sha512: 7adccd3c5111d0a00ad3208236836190d2d43c2ffb7cc12718ddc837f3145400ce9283a7bb884c21f930d12b8c61d76a397e935c4de18fdf5405932e58dcd801

  - uses: fetch
    if: ${{build.arch}} == 'aarch64'
    with:
      uri: https://blackfire.io/api/v1/releases/cli/linux/aarch64
      expected-sha512: 2e1adb1dc5f3ed8cf97f052cca066c721027c0f2cd7d45f320b9fad7c8c768e9ea82440254e72d4ee7762e8ad43bc004e0749c8693c224eb645a41ef32e668cd

  - runs: |
      tar xfv ${{build.arch}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv blackfire ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 372834

test:
  pipeline:
    - runs: |
        blackfire version
