package:
  name: php-frankenphp-8.5-decimal
  version: 2.0.2
  epoch: 0
  description: Correctly-rounded, arbitrary-precision decimal arithmetic for PHP
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-frankenphp-8.5

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - mpdecimal-dev
      - php-frankenphp-8.5
      - php-frankenphp-8.5-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php-decimal/ext-decimal
      tag: "v${{package.version}}"
      expected-commit: d09287c18c26082f0286fb1414e0dc127416c878

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: ./configure

  - uses: autoconf/make

  - name: Make install
    runs: INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=decimal.so" > "${{targets.subpkgdir}}/etc/php/conf.d/decimal.ini"

update:
  enabled: true
  github:
    identifier: php-decimal/ext-decimal
    strip-prefix: v
    tag-filter: v
    use-tag: true
